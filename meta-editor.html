<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Metadata Editor — Lio Photography</title>
  <style>
    :root{ --bg:#0b0b0d; --soft:#15151a; --card:#17171b; --line:rgba(255,255,255,.12);
           --text:#ece9e3; --dim:#9a968e; --accent:#c9a86a; }
    *{ box-sizing:border-box; }
    body{ margin:0; background:var(--bg); color:var(--text);
          font:14px/1.5 Inter,-apple-system,Segoe UI,Roboto,sans-serif; }
    a{ color:var(--accent); }
    header{ position:sticky; top:0; z-index:5; background:rgba(11,11,13,.96);
            backdrop-filter:blur(8px); border-bottom:1px solid var(--line); padding:14px 20px; }
    h1{ font-size:18px; margin:0 0 4px; } h1 b{ color:var(--accent); }
    .sub{ color:var(--dim); font-size:12px; margin:0; }
    .bar{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-top:12px; }
    .stats{ display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; font-size:12px; }
    .pill{ background:var(--soft); border:1px solid var(--line); border-radius:999px; padding:4px 11px; color:var(--dim); }
    .pill b{ color:var(--text); }
    input,textarea,select{ background:var(--soft); border:1px solid var(--line); color:var(--text);
            border-radius:6px; padding:8px 10px; font:inherit; width:100%; }
    input:focus,textarea:focus,select:focus{ outline:none; border-color:var(--accent); }
    textarea{ resize:vertical; min-height:60px; }
    button{ background:var(--accent); color:#000; border:0; border-radius:6px; padding:9px 16px;
            font-weight:600; cursor:pointer; }
    button.ghost{ background:transparent; color:var(--text); border:1px solid var(--line); }
    .search{ max-width:280px; } .filter{ max-width:200px; width:auto; }
    main{ padding:18px 20px 120px; max-width:1100px; margin:0 auto; }
    .card{ background:var(--card); border:1px solid var(--line); border-radius:10px;
           padding:14px; margin-bottom:14px; display:grid; grid-template-columns:200px 1fr; gap:16px; }
    .card.hidden{ display:none; }
    .thumb{ width:200px; }
    .thumb img{ width:100%; aspect-ratio:3/2; object-fit:cover; border-radius:6px; display:block; background:#000; }
    .thumb .fn{ font-size:11px; color:var(--dim); margin-top:6px; word-break:break-all; }
    .thumb .badge{ display:inline-block; margin-top:6px; font-size:10px; letter-spacing:.1em;
            text-transform:uppercase; padding:2px 8px; border-radius:999px; }
    .badge.full{ background:rgba(120,200,120,.18); color:#9ed99e; }
    .badge.partial{ background:rgba(201,168,106,.18); color:var(--accent); }
    .badge.empty{ background:rgba(224,138,138,.16); color:#e08a8a; }
    .fields{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .fields .full{ grid-column:1 / -1; }
    label{ display:block; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); margin-bottom:3px; }
    .hint{ font-size:10px; color:var(--dim); font-weight:400; text-transform:none; letter-spacing:0; }
    .chk{ display:flex; align-items:center; gap:8px; }
    .chk input{ width:auto; }
    .out{ position:fixed; left:0; right:0; bottom:0; background:rgba(11,11,13,.98);
          border-top:1px solid var(--line); padding:12px 20px; z-index:6; }
    .out .row{ display:flex; gap:10px; align-items:center; max-width:1100px; margin:0 auto; }
    .out textarea{ display:none; }
    .msg{ color:var(--accent); font-size:12px; }
  </style>
</head>
<body>
  <header>
    <h1>Lio <b>Photography</b> — Photo Metadata Editor</h1>
    <p class="sub">Camera fields are auto-read from EXIF. Add the <b>story</b>, <b>collection</b>, <b>location</b>, and fix anything. Then <b>Generate</b> → copy the result to me (or save it as <code>js/photo-meta.js</code>).</p>
    <div class="bar">
      <input class="search" id="search" placeholder="Search filename / location…">
      <select class="filter" id="filter">
        <option value="">All photos</option>
        <option value="missing-story">Missing story</option>
        <option value="missing-loc">Missing location</option>
        <option value="missing-title">Missing title</option>
        <option value="no-exif">No camera data</option>
      </select>
      <select class="filter" id="folder"><option value="">All folders</option></select>
      <button id="gen">Generate photo-meta.js</button>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <main id="list"></main>

  <div class="out">
    <div class="row">
      <span class="msg" id="msg">Edit above, then Generate.</span>
      <span style="flex:1"></span>
      <button class="ghost" id="copy">Copy</button>
      <button class="ghost" id="download">Download</button>
      <textarea id="output" rows="6"></textarea>
    </div>
  </div>

  <script src="js/images.js"></script>
  <script src="js/photo-meta.auto.js"></script>
  <script src="js/photo-meta.js"></script>
  <script>
  (function(){
    "use strict";
    var DATA = window.GALLERY_DATA || [];
    var AUTO = window.PHOTO_META_AUTO || {};
    var MANUAL = window.PHOTO_META || {};
    var MEDIA = window.MEDIA || {};

    // Field definitions: key, label, type, autoBacked (has an EXIF/auto equivalent)
    var FIELDS = [
      { k:"title",      label:"Title",        type:"text",  full:false, auto:true },
      { k:"collection", label:"Collection / series", type:"text", full:false, auto:false, list:"collections" },
      { k:"location",   label:"Location name", type:"text", full:false, auto:true },
      { k:"country",    label:"Country",      type:"text",  full:false, auto:true },
      { k:"coords",     label:"Coordinates — paste decimal or DMS (fills lat/lng)", type:"text", full:true, auto:false, helper:true },
      { k:"lat",        label:"Latitude",     type:"number",full:false, auto:true },
      { k:"lng",        label:"Longitude",    type:"number",full:false, auto:true },
      { k:"camera",     label:"Camera",       type:"text",  full:false, auto:true },
      { k:"lens",       label:"Lens",         type:"text",  full:false, auto:true },
      { k:"focal",      label:"Focal length", type:"text",  full:false, auto:true },
      { k:"aperture",   label:"Aperture",     type:"text",  full:false, auto:true },
      { k:"shutter",    label:"Shutter",      type:"text",  full:false, auto:true },
      { k:"iso",        label:"ISO",          type:"text",  full:false, auto:true },
      { k:"date",       label:"Date taken",   type:"text",  full:false, auto:true },
      { k:"keywords",   label:"Keywords (comma-separated)", type:"text", full:true, auto:true },
      { k:"story",      label:"Story behind the shot", type:"textarea", full:true, auto:false },
      { k:"challenges", label:"Challenges faced (optional)", type:"textarea", full:true, auto:false },
    ];

    function merged(key){
      var a = AUTO[key]||{}, m = MANUAL[key]||{}, o={}, k;
      for(k in a) o[k]=a[k];
      for(k in m) o[k]=m[k];
      return o;
    }
    function thumbSrc(folder,file){
      var m = MEDIA[folder+"/"+file], base = file.replace(/\.[^.]+$/,"");
      if(m && m.variants && m.variants.length){
        var w = m.variants[0];
        return folder+"/_web/"+encodeURIComponent(base+"-"+w+".webp");
      }
      return folder+"/"+encodeURIComponent(file);
    }

    // Build the flat list of photos
    var photos = [];
    DATA.forEach(function(cat){
      cat.images.forEach(function(file){
        photos.push({ folder:cat.folder, file:file, key:cat.folder+"/"+file, cat:cat.title });
      });
    });

    // Populate folder filter + collections datalist
    var folders = {}; photos.forEach(function(p){ folders[p.folder]=1; });
    var folderSel = document.getElementById("folder");
    Object.keys(folders).sort().forEach(function(f){
      var o=document.createElement("option"); o.value=f; o.textContent=f; folderSel.appendChild(o);
    });
    var collections = {};
    photos.forEach(function(p){ var m=merged(p.key); if(m.collection) collections[m.collection]=1; });
    var dl = document.createElement("datalist"); dl.id="collections";
    Object.keys(collections).forEach(function(c){ var o=document.createElement("option"); o.value=c; dl.appendChild(o); });
    document.body.appendChild(dl);

    function esc(s){ return String(s==null?"":s); }

    // Auto-format camera/date fields so the user can type naturally
    function normalizeField(k, val){
      val = (val==null?"":String(val)).trim();
      if(!val) return val;
      switch(k){
        case "aperture": return "f/" + val.replace(/^f\/?/i,"").trim();
        case "shutter":  return /s\s*$/i.test(val) ? val.replace(/\s*s\s*$/i," s") : val + " s";
        case "iso":      return "ISO " + val.replace(/^iso\s*/i,"").trim();
        case "focal":    return /mm\s*$/i.test(val) ? val.replace(/\s*mm\s*$/i," mm")
                              : (/^\d+(\.\d+)?$/.test(val) ? val + " mm" : val);
        case "date":     return val.replace(/[\/.:]/g,"-");
        default:         return val;
      }
    }
    // Parse "6.0,80.2" OR "6°00'11.4\"N 80°15'23.6\"E" OR a Google-Maps paste -> {lat,lng}
    function parseCoords(str){
      str = (str==null?"":String(str)).trim();
      if(!str) return null;
      var dec = str.match(/^\s*(-?\d+(?:\.\d+)?)\s*[, ]\s*(-?\d+(?:\.\d+)?)\s*$/);
      if(dec) return { lat: parseFloat(dec[1]), lng: parseFloat(dec[2]) };
      var re = /(\d+(?:\.\d+)?)\s*[°:\s]\s*(\d+(?:\.\d+)?)\s*['′:\s]\s*(\d+(?:\.\d+)?)\s*["″]?\s*([NSEWnsew])/g, m, parts=[];
      while((m = re.exec(str)) !== null){
        var v = parseFloat(m[1]) + parseFloat(m[2])/60 + parseFloat(m[3])/3600;
        var ref = m[4].toUpperCase();
        if(ref==="S"||ref==="W") v = -v;
        parts.push({ ref:ref, val:+v.toFixed(6) });
      }
      if(parts.length>=2){
        var la = parts.filter(function(p){return p.ref==="N"||p.ref==="S";})[0];
        var lo = parts.filter(function(p){return p.ref==="E"||p.ref==="W";})[0];
        return (la && lo) ? { lat: la.val, lng: lo.val } : { lat: parts[0].val, lng: parts[1].val };
      }
      return null;
    }

    // Render one card
    var list = document.getElementById("list");
    photos.forEach(function(p){
      var m = merged(p.key), a = AUTO[p.key]||{};
      var card = document.createElement("div");
      card.className = "card"; card.dataset.key = p.key; card.dataset.folder = p.folder;

      var exifCount = ["camera","lens","aperture","shutter","iso","focal"].filter(function(k){return a[k];}).length;
      var badge = exifCount>=4 ? '<span class="badge full">EXIF</span>'
                : exifCount>0 ? '<span class="badge partial">partial EXIF</span>'
                : '<span class="badge empty">no EXIF</span>';

      var fieldsHtml = FIELDS.map(function(f){
        var v = m[f.k];
        if(f.k==="keywords" && Array.isArray(v)) v = v.join(", ");
        var listAttr = f.list ? ' list="'+f.list+'"' : '';
        var cls = f.full ? "full" : "";
        if(f.type==="textarea"){
          return '<div class="'+cls+'"><label>'+f.label+'</label><textarea data-k="'+f.k+'">'+esc(v)+'</textarea></div>';
        }
        return '<div class="'+cls+'"><label>'+f.label+(f.auto&&a[f.k]?' <span class="hint">(auto)</span>':'')+'</label>'+
               '<input type="'+(f.type==="number"?"number":"text")+'" step="any"'+listAttr+' data-k="'+f.k+'" value="'+esc(v).replace(/"/g,"&quot;")+'"></div>';
      }).join("");

      card.innerHTML =
        '<div class="thumb"><img loading="lazy" src="'+thumbSrc(p.folder,p.file)+'" alt="">'+
        '<div class="fn">'+p.cat+' / '+esc(p.file)+'</div>'+badge+'</div>'+
        '<div class="fields">'+fieldsHtml+
        '<div class="chk full"><input type="checkbox" data-k="featured" id="f-'+btoa(unescape(encodeURIComponent(p.key))).replace(/=/g,"")+'"'+(m.featured?" checked":"")+'>'+
        '<label for="f-'+btoa(unescape(encodeURIComponent(p.key))).replace(/=/g,"")+'" style="margin:0;text-transform:none;letter-spacing:0;font-size:13px;color:var(--text)">Featured (Photo of the Week, highlights)</label></div>'+
        '</div>';
      list.appendChild(card);
    });

    // Auto-format camera fields + convert coordinates on change/blur
    list.addEventListener("change", function(e){
      var el = e.target, k = el.dataset && el.dataset.k;
      if(!k) return;
      if(k==="coords"){
        var c = parseCoords(el.value), card = el.closest(".card");
        if(c){
          var la=card.querySelector('[data-k="lat"]'), lo=card.querySelector('[data-k="lng"]');
          if(la) la.value=c.lat; if(lo) lo.value=c.lng;
          el.value = c.lat + ", " + c.lng;
        }
      } else if(["aperture","shutter","iso","focal","date"].indexOf(k)>=0){
        el.value = normalizeField(k, el.value);
      }
    });

    // Coverage stats
    function refreshStats(){
      var n=photos.length, exif=0, gps=0, story=0, loc=0, title=0, coll=0;
      photos.forEach(function(p){
        var card = list.querySelector('[data-key="'+cssEsc(p.key)+'"]');
        var get = function(k){ var el=card.querySelector('[data-k="'+k+'"]'); return el? (el.type==="checkbox"?el.checked:el.value.trim()) : ""; };
        if(get("camera")) exif++;
        if(get("lat")&&get("lng")) gps++;
        if(get("story")) story++;
        if(get("location")||get("country")) loc++;
        if(get("title")) title++;
        if(get("collection")) coll++;
      });
      document.getElementById("stats").innerHTML =
        '<span class="pill"><b>'+n+'</b> photos</span>'+
        '<span class="pill"><b>'+exif+'</b> with camera</span>'+
        '<span class="pill"><b>'+gps+'</b> with GPS</span>'+
        '<span class="pill"><b>'+loc+'</b> with location</span>'+
        '<span class="pill"><b>'+title+'</b> with title</span>'+
        '<span class="pill"><b>'+coll+'</b> in a collection</span>'+
        '<span class="pill"><b>'+story+'</b> with a story</span>';
    }
    function cssEsc(s){ return s.replace(/["\\]/g,"\\$&"); }
    refreshStats();

    // Filtering
    function applyFilter(){
      var q = document.getElementById("search").value.toLowerCase();
      var f = document.getElementById("filter").value;
      var fold = document.getElementById("folder").value;
      photos.forEach(function(p){
        var card = list.querySelector('[data-key="'+cssEsc(p.key)+'"]');
        var get = function(k){ var el=card.querySelector('[data-k="'+k+'"]'); return el? el.value.trim() : ""; };
        var show = true;
        if(q && (p.key.toLowerCase().indexOf(q)<0 && get("location").toLowerCase().indexOf(q)<0)) show=false;
        if(fold && p.folder!==fold) show=false;
        if(f==="missing-story" && get("story")) show=false;
        if(f==="missing-loc" && (get("location")||get("country"))) show=false;
        if(f==="missing-title" && get("title")) show=false;
        if(f==="no-exif" && get("camera")) show=false;
        card.classList.toggle("hidden", !show);
      });
    }
    document.getElementById("search").addEventListener("input", applyFilter);
    document.getElementById("filter").addEventListener("change", applyFilter);
    document.getElementById("folder").addEventListener("change", applyFilter);

    // Generate output — only write fields that differ from auto, or manual-only fields
    var MANUAL_ONLY = { collection:1, story:1, challenges:1, featured:1 };
    function generate(){
      var result = {};
      photos.forEach(function(p){
        var card = list.querySelector('[data-key="'+cssEsc(p.key)+'"]');
        var a = AUTO[p.key]||{}, entry = {};
        FIELDS.forEach(function(f){
          if(f.helper) return;   // skip the coords paste helper
          var el = card.querySelector('[data-k="'+f.k+'"]');
          if(!el) return;
          var val = normalizeField(f.k, el.value);   // auto-format camera/date fields
          if(val==="") return;
          if(f.k==="keywords"){
            var arr = val.split(",").map(function(s){return s.trim();}).filter(Boolean);
            if(arr.length && JSON.stringify(arr)!==JSON.stringify(a.keywords||null)) entry.keywords = arr;
            return;
          }
          if(f.type==="number"){
            var num = parseFloat(val);
            if(!isNaN(num) && num!==a[f.k]) entry[f.k]=num;
            return;
          }
          // string fields: include if manual-only or differs from auto
          if(MANUAL_ONLY[f.k] || val !== (a[f.k]==null?"":String(a[f.k]))) entry[f.k]=val;
        });
        var feat = card.querySelector('[data-k="featured"]');
        if(feat && feat.checked) entry.featured = true;
        if(Object.keys(entry).length) result[p.key] = entry;
      });
      var js = "/* Manual per-photo metadata — generated by meta-editor.html.\n"+
               "   Your edits WIN over the auto layer (photo-meta.auto.js). */\n"+
               "window.PHOTO_META = " + JSON.stringify(result, null, 2) + ";\n";
      var out = document.getElementById("output");
      out.value = js; out.style.display="block";
      document.getElementById("msg").textContent = Object.keys(result).length + " photos have manual data. Copy this, or Download, and send it to me.";
      refreshStats();
      return js;
    }
    document.getElementById("gen").addEventListener("click", generate);
    document.getElementById("copy").addEventListener("click", function(){
      var js = generate();
      navigator.clipboard.writeText(js).then(function(){
        document.getElementById("msg").textContent = "Copied to clipboard ✓ — paste it to me in the chat.";
      }, function(){ document.getElementById("output").select(); });
    });
    document.getElementById("download").addEventListener("click", function(){
      var js = generate();
      var blob = new Blob([js], {type:"text/javascript"});
      var a = document.createElement("a");
      a.href = URL.createObjectURL(blob); a.download = "photo-meta.js"; a.click();
      document.getElementById("msg").textContent = "Downloaded photo-meta.js — replace js/photo-meta.js (or send it to me).";
    });
  })();
  </script>
</body>
</html>
